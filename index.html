<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic 360° — Pôle Familles EFSF</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== ÉCRAN CONNEXION ===== -->
  <div id="screen-login" class="screen">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">🧭</div>
        <div class="brand-name">Diagnostic 360°</div>
        <div class="brand-sub">Pôle Familles · Enfance Sans Fil</div>
      </div>
      <p class="login-hint" id="login-mode-hint">Entre ton e-mail et ton mot de passe pour te connecter.</p>

      <input type="email" id="login-email" class="input" placeholder="ton-email@exemple.org" autocomplete="email">
      <input type="password" id="login-password" class="input" placeholder="Mot de passe" autocomplete="current-password">

      <button id="login-btn" class="btn btn-primary">Se connecter</button>
      <button id="signup-toggle" class="btn-ghost" style="width:100%; margin-top:8px">Première fois ? Créer mon accès</button>

      <div id="login-msg" class="login-msg"></div>
      <div id="debug-panel" style="margin-top:16px; padding:10px; background:#f5f0e8; border:1px solid #ddd; border-radius:6px; font-family:monospace; font-size:11px; white-space:pre-wrap; text-align:left; display:none"></div>
    </div>
  </div>

  <!-- ===== APP (après connexion) ===== -->
  <div id="screen-app" class="screen" style="display:none">
    <header class="topbar">
      <div class="topbar-brand">🧭 Diagnostic 360°</div>
      <div class="topbar-right">
        <span id="user-name" class="user-name"></span>
        <button id="logout-btn" class="btn-ghost">Se déconnecter</button>
      </div>
    </header>

    <!-- Vue liste des familles -->
    <main id="view-list" class="view">
      <div class="view-head">
        <h1>Familles suivies</h1>
        <button id="new-famille-btn" class="btn btn-primary">+ Nouvelle famille</button>
      </div>
      <div id="familles-list" class="familles-list">
        <div class="empty-state">Chargement…</div>
      </div>
    </main>

    <!-- Vue fiche famille -->
    <main id="view-famille" class="view" style="display:none">
      <button id="back-btn" class="btn-ghost back-btn">← Retour aux familles</button>
      <div class="famille-head">
        <h1 id="famille-title">—</h1>
        <div id="famille-meta" class="famille-meta"></div>
      </div>
      <div id="volets-container" class="volets-grid"></div>
    </main>
  </div>

  <!-- ===== MODALE : nouvelle famille ===== -->
  <div id="modal-famille" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h2>Nouvelle famille</h2>
      <label class="field-label">Code famille (pas de nom complet)</label>
      <input type="text" id="new-code" class="input" placeholder="ex : F-2026-014">
      <label class="field-label">Prénom de l'enfant</label>
      <input type="text" id="new-prenom" class="input" placeholder="ex : Léo">
      <label class="field-label">Date de naissance</label>
      <input type="date" id="new-naissance" class="input">
      <label class="checkbox-line">
        <input type="checkbox" id="new-consentement">
        Consentement de la famille recueilli
      </label>
      <div class="modal-actions">
        <button id="cancel-famille-btn" class="btn-ghost">Annuler</button>
        <button id="save-famille-btn" class="btn btn-primary">Créer la fiche</button>
      </div>
    </div>
  </div>

  <!-- ===== MODALE : ajouter une entrée de volet ===== -->
  <div id="modal-entry" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h2 id="entry-modal-title">Mettre à jour un volet</h2>
      <div id="entry-fields"></div>
      <div class="modal-actions">
        <button id="cancel-entry-btn" class="btn-ghost">Annuler</button>
        <button id="save-entry-btn" class="btn btn-primary">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
