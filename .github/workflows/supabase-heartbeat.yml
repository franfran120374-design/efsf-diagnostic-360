name: Supabase Heartbeat

on:
  schedule:
    # Tous les 3 jours à 6h du matin (UTC)
    - cron: "0 6 */3 * *"
  workflow_dispatch: # permet aussi de le lancer manuellement depuis l'onglet Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase pour éviter la mise en pause
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/familles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Code de réponse HTTP : $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "❌ Le ping a échoué (code $response) — le projet est peut-être en pause."
            exit 1
          fi
          echo "✅ Projet Supabase actif."
